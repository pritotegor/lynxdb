syntax = "proto3";

package lynxdb.cluster.v1;

option go_package = "github.com/lynxbase/lynxdb/pkg/cluster/rpc/proto";

// MetaService handles cluster metadata operations via the Raft leader.
service MetaService {
  // Handshake registers a node with the cluster and returns the current shard map.
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);

  // Heartbeat reports node health and resource usage to the meta leader.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // WatchShardMap streams shard map updates to the caller.
  rpc WatchShardMap(WatchShardMapRequest) returns (stream ShardMapUpdate);

  // RenewLease extends the validity of a shard lease.
  rpc RenewLease(RenewLeaseRequest) returns (RenewLeaseResponse);

  // RequestCompaction requests permission to compact a shard.
  rpc RequestCompaction(RequestCompactionRequest) returns (RequestCompactionResponse);

  // ReleaseCompaction releases a compaction lock held on a shard.
  rpc ReleaseCompaction(ReleaseCompactionRequest) returns (ReleaseCompactionResponse);

  // ProposeDrain requests to drain a shard from a node before removal.
  rpc ProposeDrain(ProposeDrainRequest) returns (ProposeDrainResponse);

  // CompleteDrain marks a shard drain as complete, transitions to new primary.
  rpc CompleteDrain(CompleteDrainRequest) returns (CompleteDrainResponse);

  // ReportFieldCatalog reports local field catalog deltas from an ingest node.
  rpc ReportFieldCatalog(ReportFieldCatalogRequest) returns (ReportFieldCatalogResponse);

  // ReportSources reports local source registry deltas from an ingest node.
  rpc ReportSources(ReportSourcesRequest) returns (ReportSourcesResponse);

  // AssignAlert assigns an alert to a query node via rendezvous hashing.
  rpc AssignAlert(AssignAlertRequest) returns (AssignAlertResponse);

  // ReportAlertFired records the timestamp of an alert trigger.
  rpc ReportAlertFired(ReportAlertFiredRequest) returns (ReportAlertFiredResponse);

  // RegisterView registers or updates a materialized view definition.
  rpc RegisterView(RegisterViewRequest) returns (RegisterViewResponse);
}

// IngestService handles distributed event ingestion.
service IngestService {
  // IngestBatch forwards an event batch to the shard owner.
  rpc IngestBatch(IngestBatchRequest) returns (IngestBatchResponse);

  // ReplicateBatch streams event entries to replica nodes for ISR replication.
  rpc ReplicateBatch(stream ReplicateEntry) returns (ReplicateBatchResponse);
}

// QueryService handles distributed query execution.
service QueryService {
  // ExecuteQuery runs a partial query on a shard and streams results.
  rpc ExecuteQuery(ExecuteQueryRequest) returns (stream QueryResult);

  // NotifyPartCommitted informs query nodes that a new part is available.
  rpc NotifyPartCommitted(PartCommittedNotification) returns (PartCommittedResponse);

  // SubscribeTail opens a live tail stream for real-time event delivery.
  rpc SubscribeTail(SubscribeTailRequest) returns (stream TailEvent);
}

// --- MetaService Messages ---

message HandshakeRequest {
  uint32 protocol_version = 1;
  string node_id = 2;
  string addr = 3;
  string grpc_addr = 4;
  repeated string roles = 5;
  string version = 6;
}

message HandshakeResponse {
  uint32 protocol_version = 1;
  string leader_id = 2;
  string leader_addr = 3;
  bytes shard_map = 4; // msgpack-encoded ShardMap
  uint64 shard_map_epoch = 5;
}

message HeartbeatRequest {
  string node_id = 1;
  NodeResourceReport resources = 2;
}

message NodeResourceReport {
  double cpu_percent = 1;
  int64 memory_used_bytes = 2;
  int64 memory_total_bytes = 3;
  int64 disk_used_bytes = 4;
  int64 disk_total_bytes = 5;
  int64 active_queries = 6;
  int64 ingest_rate_eps = 7; // events per second
}

message HeartbeatResponse {
  bool ok = 1;
  string leader_id = 2;
}

message WatchShardMapRequest {
  uint64 current_epoch = 1; // client's current epoch; server sends if newer
}

message ShardMapUpdate {
  bytes shard_map = 1; // msgpack-encoded ShardMap
  uint64 epoch = 2;
  bytes field_catalog = 3;    // msgpack-encoded []GlobalFieldInfo (piggybacked)
  bytes source_registry = 4;  // msgpack-encoded []GlobalSourceInfo (piggybacked)
}

message RenewLeaseRequest {
  string node_id = 1;
  string shard_id = 2;
  uint64 epoch = 3;
}

message RenewLeaseResponse {
  bool granted = 1;
  int64 expires_at_unix_ns = 2;
  string leader_addr = 3; // set when this node is not the leader (redirect)
}

message RequestCompactionRequest {
  string node_id = 1;
  string shard_id = 2;
  uint64 catalog_version = 3;
  repeated string input_parts = 4;
  int32 target_level = 5;
}

message RequestCompactionResponse {
  bool granted = 1;
  string task_id = 2;
  string leader_addr = 3; // set when this node is not the leader (redirect)
}

message ReleaseCompactionRequest {
  string task_id = 1;
  bool success = 2;
  repeated string output_parts = 3;
}

message ReleaseCompactionResponse {
  bool ok = 1;
}

// ProposeDrain initiates draining a shard from a node.
message ProposeDrainRequest {
  string shard_id = 1;
  string node_id = 2;
}

message ProposeDrainResponse {
  bool ok = 1;
  string leader_addr = 2; // set when this node is not the leader (redirect)
}

// CompleteDrain marks a shard drain as complete, allowing failover to a new primary.
message CompleteDrainRequest {
  string shard_id = 1;
  string node_id = 2;
  string new_primary_id = 3;
}

message CompleteDrainResponse {
  bool ok = 1;
  string leader_addr = 2; // set when this node is not the leader (redirect)
}

// --- Distributed Subsystem Messages ---

message FieldDeltaProto {
  string name = 1;
  string type = 2;
  int64 count = 3;
  repeated FieldValueEntryProto top_values = 4;
}

message FieldValueEntryProto {
  string value = 1;
  int64 count = 2;
}

message ReportFieldCatalogRequest {
  string node_id = 1;
  repeated FieldDeltaProto fields = 2;
}

message ReportFieldCatalogResponse {
  bool ok = 1;
}

message SourceDeltaProto {
  string name = 1;
  int64 event_count = 2;
  int64 last_seen_unix_ns = 3;
}

message ReportSourcesRequest {
  string node_id = 1;
  repeated SourceDeltaProto sources = 2;
}

message ReportSourcesResponse {
  bool ok = 1;
}

message AssignAlertRequest {
  string alert_id = 1;
  repeated string query_node_ids = 2;
}

message AssignAlertResponse {
  bool ok = 1;
  string assigned_node_id = 2;
}

message ReportAlertFiredRequest {
  string alert_id = 1;
  int64 fired_at_unix_ns = 2;
}

message ReportAlertFiredResponse {
  bool ok = 1;
}

message RegisterViewRequest {
  string name = 1;
  string query = 2;
  string status = 3;
  string coordinator_node_id = 4;
}

message RegisterViewResponse {
  bool ok = 1;
}

// --- IngestService Messages ---

// AckLevel specifies the durability guarantee for ingest batches.
enum AckLevel {
  ACK_NONE = 0; // Fire-and-forget, no durability guarantee.
  ACK_ONE = 1;  // Acknowledged after local commit (default).
  ACK_ALL = 2;  // Acknowledged after all ISR replicas confirm.
}

message IngestBatchRequest {
  string shard_id = 1;
  bytes events = 2;           // msgpack-encoded []*event.Event
  uint64 lease_epoch = 3;
  uint64 batch_seq = 4;       // monotonic batch sequence for dedup
  AckLevel ack_level = 5;     // requested durability level
}

message IngestBatchResponse {
  bool ok = 1;
  uint64 batch_seq = 2;       // confirmed batch sequence
}

// ReplicateEntry carries a batch of events to replica nodes for ISR replication.
message ReplicateEntry {
  string shard_id = 1;
  bytes events = 2;           // msgpack-encoded []*event.Event
  uint64 batch_seq = 3;       // batch sequence for ordering and dedup
}

message ReplicateBatchResponse {
  bool ok = 1;
  uint64 last_batch_seq = 2;  // highest replicated batch sequence
}

// --- QueryService Messages ---

message ExecuteQueryRequest {
  string query = 1;
  string shard_id = 2;
  int64 from_unix_ns = 3;
  int64 to_unix_ns = 4;
  bytes partial_agg_spec = 5;     // msgpack-encoded PartialAggSpec (nil = full scan)
  repeated string required_cols = 6;
}

message QueryResult {
  bytes row = 1; // msgpack-encoded row
  bool is_partial = 2;
}

// PartCommittedNotification informs query nodes that a new part is available for queries.
message PartCommittedNotification {
  string shard_id = 1;
  string part_id = 2;
  int64 min_time_unix_ns = 3;
  int64 max_time_unix_ns = 4;
  int64 event_count = 5;
  string s3_key = 6;          // S3 object key for the part file
  uint64 batch_seq = 7;       // highest batch sequence included in this part
}

message PartCommittedResponse {
  bool ok = 1;
}

message SubscribeTailRequest {
  string query = 1;
  int64 from_unix_ns = 2;
}

message TailEvent {
  bytes event = 1;          // msgpack-encoded event fields
  int64 watermark_ns = 2;   // current node watermark
  bool is_catchup = 3;      // true for historical events during catchup phase
}
